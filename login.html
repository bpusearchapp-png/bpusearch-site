<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Connexion BPUSearch — Mode Gratuit</title>
    <style>
        body { margin:0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f6f7f9; color: #1f2933; display: flex; flex-direction: column; min-height: 100vh; }
        header { background: #243447; color: white; padding: 20px; text-align: center; }
        main { flex: 1; max-width: 480px; margin: 40px auto; width: 100%; padding: 20px; box-sizing: border-box; }
        .box { background: white; border: 1px solid #e1e5ea; border-radius: 12px; padding: 32px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        h1 { margin: 0 0 8px; font-size: 24px; text-align: center; }
        p { color: #697586; text-align: center; margin-bottom: 24px; line-height: 1.5; }
        label { display: block; font-size: 14px; font-weight: bold; margin-bottom: 8px; }
        input[type=email] { width: 100%; padding: 12px; border: 1px solid #c8d0d9; border-radius: 8px; box-sizing: border-box; font-size: 16px; margin-bottom: 16px; }
        button { width: 100%; padding: 14px; background: #2563eb; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #1d4ed8; }
        button:disabled { background: #94a3b8; cursor: not-allowed; }
        .msg { margin-top: 16px; padding: 12px; border-radius: 8px; font-size: 14px; display: none; text-align: center; }
        .msg.success { background: #dcfce7; color: #166534; }
        .msg.error { background: #fee2e2; color: #991b1b; }
        .adsense-placeholder { margin-top: 40px; text-align: center; background: #eee; border: 1px dashed #ccc; padding: 20px; color: #999; font-size: 12px; }
        footer { padding: 20px; text-align: center; font-size: 12px; color: #94a3b8; }
    </style>
</head>
<body>
    <header>
        <h2 style="margin:0">📘 BPUSearch</h2>
    </header>
    <main>
        <div class="box">
            <h1>Connexion</h1>
            <p>Entrez votre email pour recevoir un lien magique de connexion.</p>
            <form id="loginForm">
                <label for="email">Votre adresse email :</label>
                <input type="email" id="email" placeholder="nom@exemple.com" required>
                <button type="submit" id="submitBtn">Recevoir mon lien</button>
            </form>
            <div id="message" class="msg"></div>
        </div>

        <!-- AdSense Placeholder -->
        <div class="adsense-placeholder">
            [Publicité Google AdSense]
        </div>
    </main>
    <footer>
        BPUSearch &copy; 2026 — Outil de recherche de prix unitaires BTP
    </footer>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const state = urlParams.get('state');
        const port = urlParams.get('port');

        const form = document.getElementById('loginForm');
        const btn = document.getElementById('submitBtn');
        const msg = document.getElementById('message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;

            if (!state || !port) {
                msg.textContent = "Erreur : Session invalide. Veuillez relancer l'application.";
                msg.className = "msg error";
                msg.style.display = "block";
                return;
            }

            btn.disabled = true;
            btn.textContent = "Envoi en cours...";
            msg.style.display = "none";

            try {
                const response = await fetch('https://bpusearch-worker.bpusearch-worker.workers.dev/auth/request-link', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, state, port })
                });
                const data = await response.json();

                if (response.ok) {
                    msg.textContent = "Lien envoyé ! Vérifiez votre boîte mail (et vos spams).";
                    msg.className = "msg success";
                    msg.style.display = "block";
                    form.style.display = "none";
                } else {
                    msg.textContent = data.error || "Une erreur est survenue.";
                    msg.className = "msg error";
                    msg.style.display = "block";
                }
            } catch (err) {
                msg.textContent = "Erreur de connexion au serveur.";
                msg.className = "msg error";
                msg.style.display = "block";
            } finally {
                btn.disabled = false;
                btn.textContent = "Recevoir mon lien";
            }
        });
    </script>
</body>
</html>
